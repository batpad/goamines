# nginx reverse proxy for the goamines Datasette service.
# Install: copy to /etc/nginx/sites-available/goamines, symlink into sites-enabled,
#          `nginx -t && systemctl reload nginx`, then `certbot --nginx -d <host>`.
# Written HTTP-first; certbot rewrites this to add the :443 block + HTTP->HTTPS redirect.
#
# NOTE: after certbot runs, the LIVE file is certbot-managed and has a `listen 443 ssl`
# server block. The `location /downloads/` below must live in that 443 server block (it is
# shown here in the HTTP block for reference). `/downloads/` is a more specific prefix than
# `/`, so it is served from disk instead of being proxied to Datasette.

server {
    listen 80;
    listen [::]:80;
    server_name goamines.whydidweevendothis.com;

    # Static downloads (source RTI spreadsheets, etc.) — populated out-of-band via scp.
    location /downloads/ {
        alias /var/www/goamines/downloads/;
        autoindex on;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10m;
}
